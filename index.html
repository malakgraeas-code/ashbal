<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حضور الفصول الذكي</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; padding-bottom: 70px; }
        
        .bottom-nav { background: var(--primary); color: white; display: flex; position: fixed; bottom: 0; width: 100%; height: 60px; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; opacity: 0.6; }
        .nav-btn.active { opacity: 1; border-top: 3px solid var(--accent); background: rgba(255,255,255,0.1); }

        .container { max-width: 950px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: right; }
        
        /* اختيار الفصل الحالي */
        .class-selector { background: var(--accent); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        select { padding: 8px; border-radius: 5px; border: none; font-weight: bold; }

        #reader { width: 100%; max-width: 450px; margin: auto; border-radius: 15px; border: 4px solid var(--primary); }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; }

        .name-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .name-tag { background: #eee; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 12px; }
        th { background: var(--primary); color: white; }
        .is-present { background: #d4edda !important; font-weight: bold; }

        input, .btn { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-green { background: var(--success); color: white; border: none; cursor: pointer; }
        
        @media print { .no-print, .bottom-nav { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="class-selector no-print">
        <span>الفصل الحالي:</span>
        <select id="activeClassSelect" onchange="switchClass()"></select>
    </div>

    <div id="page-scan" class="page">
        <div class="card" style="text-align: center;">
            <h3 id="scan-title">تسجيل حضور</h3>
            <div id="reader"></div>
            <div id="scan-status" class="status-msg" style="background: #f0f0f0;">جاهز للمسح..</div>
        </div>
    </div>

    <div id="page-admin" class="page" style="display: none;">
        <div class="card no-print">
            <h3>📂 إدارة الفصول</h3>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-class-name" placeholder="اسم فصل جديد (مثلاً: إعدادي)..." style="flex:1;">
                <button class="btn-green" onclick="addClass()">إضافة فصل</button>
            </div>
        </div>

        <div class="card no-print">
            <h3 id="manage-names-title">إدارة أسماء الفصل</h3>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-member-name" placeholder="اسم الخادم..." style="flex:1;">
                <button class="btn-green" onclick="addMember()">+</button>
            </div>
            <div id="members-display" class="name-grid"></div>
        </div>

        <div class="card">
            <h3>📅 جدول الحضور والتصميم</h3>
            <div class="no-print">
                <label><input type="checkbox" value="السبت" checked onchange="saveAll()"> السبت</label>
                <label><input type="checkbox" value="الاثنين" checked onchange="saveAll()"> الاثنين</label>
                <label><input type="checkbox" value="الخميس" checked onchange="saveAll()"> الخميس</label>
            </div>
            <div style="overflow-x: auto;">
                <table id="main-table">
                    <thead><tr id="t-head"></tr></thead>
                    <tbody id="t-body"></tbody>
                </table>
            </div>
            <button class="btn-green no-print" style="width:100%; margin-top:15px; background:var(--accent);" onclick="window.print()">طباعة التقرير 🖨️</button>
        </div>
    </div>
</div>

<nav class="bottom-nav no-print">
    <div class="nav-btn active" id="nav-scan" onclick="showPage('scan')"><span>📸</span><span>حضور</span></div>
    <div class="nav-btn" id="nav-admin" onclick="showPage('admin')"><span>⚙️</span><span>الإدارة</span></div>
</nav>

<script>
    // البيانات الافتراضية
    let data = JSON.parse(localStorage.getItem('SCHOOL_SYSTEM')) || {
        activeClass: "أشبال",
        classes: {
            "أشبال": {
                members: ["أبانوب شنوده", "أبانوب مجدي", "إبرام رزق", "بيشوي كامل", "مينا سمير"], // عينة من الـ 31
                logs: {}
            }
        }
    };

    function playBeep() {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    function saveAll() {
        localStorage.setItem('SCHOOL_SYSTEM', JSON.stringify(data));
        refreshUI();
    }

    function showPage(p) {
        document.getElementById('page-scan').style.display = p === 'scan' ? 'block' : 'none';
        document.getElementById('page-admin').style.display = p === 'admin' ? 'block' : 'none';
        document.getElementById('nav-scan').classList.toggle('active', p === 'scan');
        document.getElementById('nav-admin').classList.toggle('active', p === 'admin');
    }

    function addClass() {
        let name = document.getElementById('new-class-name').value.trim();
        if(name && !data.classes[name]) {
            data.classes[name] = { members: [], logs: {} };
            data.activeClass = name;
            document.getElementById('new-class-name').value = '';
            saveAll();
        }
    }

    function switchClass() {
        data.activeClass = document.getElementById('activeClassSelect').value;
        saveAll();
    }

    function addMember() {
        let name = document.getElementById('new-member-name').value.trim();
        let currentClass = data.classes[data.activeClass];
        if(name && !currentClass.members.includes(name)) {
            currentClass.members.push(name);
            document.getElementById('new-member-name').value = '';
            saveAll();
        }
    }

    function removeMember(n) {
        if(confirm(`حذف ${n}؟`)) {
            data.classes[data.activeClass].members = data.classes[data.activeClass].members.filter(x => x !== n);
            saveAll();
        }
    }

    function refreshUI() {
        // تحديث القائمة المنسدلة للفصول
        let select = document.getElementById('activeClassSelect');
        select.innerHTML = Object.keys(data.classes).map(c => `<option value="${c}" ${c === data.activeClass ? 'selected' : ''}>${c}</option>`).join('');
        
        document.getElementById('scan-title').innerText = `تسجيل حضور: ${data.activeClass}`;
        document.getElementById('manage-names-title').innerText = `إدارة أسماء فصل: ${data.activeClass}`;

        // تحديث عرض الأسماء
        let currentClass = data.classes[data.activeClass];
        document.getElementById('members-display').innerHTML = currentClass.members.sort().map(m => `
            <div class="name-tag"><span>${m}</span><b style="color:red; cursor:pointer" onclick="removeMember('${m}')">×</b></div>
        `).join('');

        // تحديث الجدول
        let now = new Date(), m = now.getMonth(), y = now.getFullYear();
        let selDays = Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
        let head = document.getElementById('t-head'), body = document.getElementById('t-body');
        
        let hHtml = '<th>الاسم</th>', dates = [];
        let dCount = new Date(y, m + 1, 0).getDate();

        for(let i=1; i<=dCount; i++) {
            let dObj = new Date(y, m, i);
            if(selDays.includes(dObj.toLocaleDateString('ar-EG',{weekday:'long'}))) {
                hHtml += `<th>${i}</th>`; dates.push(i);
            }
        }
        head.innerHTML = hHtml;

        body.innerHTML = currentClass.members.sort().map(n => {
            let r = `<td><b>${n}</b></td>`;
            dates.forEach(d => {
                let key = `${y}-${m+1}-${d}`;
                let ok = currentClass.logs[n] && currentClass.logs[n].includes(key);
                r += `<td class="${ok?'is-present':''}">${ok?'✔':'-'}</td>`;
            });
            return `<tr>${r}</tr>`;
        }).join('');
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(txt => {
        let name = txt.trim(), now = new Date();
        let key = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        let currentClass = data.classes[data.activeClass];
        let status = document.getElementById('scan-status');

        if(currentClass.members.includes(name)) {
            if(!currentClass.logs[name]) currentClass.logs[name] = [];
            if(!currentClass.logs[name].includes(key)) {
                currentClass.logs[name].push(key);
                playBeep();
                saveAll();
                status.innerText = `✅ تم: ${name}`; status.style.background = "#d4edda";
            } else {
                status.innerText = `⚠️ مسجل مسبقاً!`; status.style.background = "#fff3cd";
            }
        } else {
            alert(`الاسم "${name}" غير موجود في فصل "${data.activeClass}"! تأكد من اختيار الفصل الصحيح من الأعلى.`);
        }
    });

    refreshUI();
</script>
</body>
  </html>
